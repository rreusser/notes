  <script id="intro" type="text/markdown">
    # Rational Approximation with blahpack

    This notebook demonstrates [blahpack](https://github.com/rreusser/notes/tree/main/blahpack), a JavaScript implementation of reference BLAS and LAPACK routines translated from Fortran. We exercise these routines through the **AAA algorithm** for rational approximation and its applications to solving PDEs via complex rational functions.

    The chain of LAPACK dependencies is: **zgesvd** (complex SVD, bidiagonal QR) drives the AAA iteration; **zggev** (QZ algorithm) extracts poles and zeros; **Householder QR** (via a standalone solver) handles the least-squares fits. All computation runs in a web worker; visualizations use WebGPU.

    See also the [translation progress report](../progress.html) for the current status of BLAS/LAPACK routine coverage.

    **References:**
    - **[NST18]** Nakatsukasa, Sète, Trefethen, ["The AAA Algorithm for Rational Approximation"](https://arxiv.org/abs/1612.00337), SIAM J. Sci. Comput. 40(3), 2018.
    - **[C20]** Costa, ["Solving Laplace problems with the AAA algorithm"](https://arxiv.org/abs/2001.09439), 2020.
    - **[XWT23]** Xue, Waters, Trefethen, ["Computation of 2D Stokes flows via lightning and AAA rational approximation"](https://arxiv.org/abs/2306.13545), 2023.
    - **[BT21]** Brubeck, Trefethen, ["Vandermonde with Arnoldi"](https://doi.org/10.1137/19M1259548), SIAM Review 63(2), 2021.
  </script>

  <script id="method" type="text/markdown">
    <details><summary><strong>Method details</strong> — polynomial + rational decomposition, SVD variants, least-squares solvers</summary>

    The Laplace solver follows [C20], decomposing the solution ${ tex`u(z)` } into a **smooth polynomial part** and a **singular rational part**:

    ${ tex.block`w(z) = \underbrace{\sum_{n=0}^{N} a_n(z-c)^n}_{\text{smooth}} + \underbrace{\sum_{k=1}^{K} \frac{b_k}{z - p_k} + b_0}_{\text{singular}} + i\gamma` }

    where ${ tex`c` } is the domain centroid, ${ tex`p_k` } are poles outside the domain, and ${ tex`\gamma` } is a constant that zeros the imaginary part at ${ tex`c` }. The physical solution is ${ tex`u = \operatorname{Re}(w)` }.

    **Step 1: Polynomial fit.** Given ${ tex`M \approx 800` } boundary samples ${ tex`(z_j, u_j)` }, fit ${ tex`N + 1` } complex polynomial coefficients via real least squares. Since ${ tex`\operatorname{Re}(\sum a_n(z_j - c)^n) = u_j` } and ${ tex`a_n = \alpha_n + i\beta_n` }, this separates into a real overdetermined system of size ${ tex`M \times (2N+1)` }. We solve this with **Householder QR**, which is the standard approach for dense least squares. MATLAB's `\` operator uses the same method internally for overdetermined systems.

    **Step 2: AAA rational approximation.** The boundary residual ${ tex`r_j = u_j - \operatorname{Re}(s(z_j))` } is approximated by the AAA algorithm [NST18], which builds a rational function in **barycentric form**:

    ${ tex.block`R(z) = \frac{\sum_k w_k f_k / (z - z_k)}{\sum_k w_k / (z - z_k)}` }

    where ${ tex`z_k` } are greedily selected support points, ${ tex`f_k = r(z_k)` }, and ${ tex`w_k` } are barycentric weights computed via **SVD**. At each iteration, the algorithm selects the point of maximum error, forms a Loewner matrix, and takes its smallest right singular vector as the new weights.

    **Our implementation vs. MATLAB.** The reference MATLAB code calls `svd(A, 0)` — a thin SVD via LAPACK's `dgesdd` (divide-and-conquer). Our JavaScript implementation calls `zgesvd` (complex bidiagonal QR iteration), translated from the reference Fortran LAPACK into JavaScript as part of the blahpack project. The key difference is algorithmic: `dgesdd` is typically faster for large matrices but `zgesvd` is simpler and equally accurate. Both compute the same singular values and vectors to machine precision.

    We use the **complex** SVD (`zgesvd`) even though the AAA algorithm as stated in [NST18] operates on real-valued functions. This is because the Loewner matrix ${ tex`A_{ij} = (f_i - f_k) / (z_i - z_k)` } is complex (the sample points ${ tex`z_k` } lie in ${ tex`\mathbb{C}` }), so the SVD must handle complex entries. MATLAB's `svd` dispatches to the complex routine automatically; our code calls `zgesvd` explicitly.

    **Step 3: Pole extraction.** Poles and zeros are extracted from the barycentric form by solving a **generalized eigenvalue problem** on a companion-like matrix pencil ${ tex`(E, B)` } of size ${ tex`(m+1) \times (m+1)` }, using the **QZ algorithm** (`zggev`). This is identical to the MATLAB approach (`eig(E, B)`), again translated from reference LAPACK Fortran.

    **Step 4: Pole filtering.** Only poles exterior to the domain are retained (tested via ray-casting point-in-polygon). Interior poles would create non-physical singularities in the harmonic solution.

    **Step 5: Singular coefficient fit.** With ${ tex`K` } filtered exterior poles, fit complex coefficients ${ tex`b_k` } and constant ${ tex`b_0` } via least squares on the Cauchy system ${ tex`\operatorname{Re}(\sum b_k/(z_j - p_k) + b_0) = r_j` }. This is again a real overdetermined system solved by Householder QR.

    **GPU evaluation.** The final solution is evaluated per-pixel in a WebGPU fragment shader using f32 arithmetic. The polynomial part is evaluated in monomial form (18 terms) and the singular part as a direct partial-fraction sum (40–90 terms depending on `mmax`). At `mmax ≥ 200`, the singular coefficients grow to ${ tex`O(10^4)` } with massive cancellation, exceeding f32's ~7-digit precision. At `mmax = 100`, the evaluation is clean.

    </details>
  </script>

  <script id="worker" type="module">
    const worker = new Worker(new URL('./worker.js', import.meta.url), { type: 'module' });
    let _nextId = 0;
    const _pending = new Map();

    worker.onmessage = (e) => {
      const { id } = e.data;
      const resolve = _pending.get(id);
      if (resolve) { _pending.delete(id); resolve(e.data); }
    };

    function workerCall(msg) {
      return new Promise(resolve => {
        const id = _nextId++;
        _pending.set(id, resolve);
        worker.postMessage({ ...msg, id });
      });
    }

    invalidation.then(() => worker.terminate());
  </script>

  <script id="helpers" type="module">
    function linspace(a, b, step) {
      const arr = [];
      if (a <= b) for (let x = a; x <= b + step / 2; x += step) arr.push(x);
      else for (let x = a; x >= b - step / 2; x -= step) arr.push(x);
      return arr;
    }

    function buildLShapedBoundary(stp) {
      const boundary = [];
      for (const x of linspace(0, 2, stp)) boundary.push([x, 0]);
      for (const y of linspace(0, 1, stp)) boundary.push([2, y]);
      for (const x of linspace(2, 1, stp)) boundary.push([x, 1]);
      for (const y of linspace(1, 2, stp)) boundary.push([1, y]);
      for (const x of linspace(1, 0, stp)) boundary.push([x, 2]);
      for (const y of linspace(2, 0, stp)) boundary.push([0, y]);
      return boundary;
    }

    // [C20] §3.2: blade-shaped domain γ = 2cos(θ) + i(sin(θ) + 2cos³(θ))
    function buildBladeBoundary(n) {
      const boundary = [];
      for (let i = 0; i < n; i++) {
        const theta = 2 * Math.PI * i / n;
        const x = 2 * Math.cos(theta);
        const y = Math.sin(theta) + 2 * Math.pow(Math.cos(theta), 3);
        boundary.push([x, y]);
      }
      return boundary;
    }

    // Square domain [0, 2] × [0, 2]
    function buildSquareBoundary(stp) {
      const boundary = [];
      for (const x of linspace(0, 2, stp)) boundary.push([x, 0]);
      for (const y of linspace(0, 2, stp)) boundary.push([2, y]);
      for (const x of linspace(2, 0, stp)) boundary.push([x, 2]);
      for (const y of linspace(2, 0, stp)) boundary.push([0, y]);
      return boundary;
    }
  </script>

  <script id="aaaHeader" type="text/markdown">
    ## The AAA Algorithm — [NST18]

    The AAA (Adaptive Antoulas-Anderson) algorithm builds rational approximations in barycentric form, using **zgesvd** (complex SVD) at each iteration to find optimal barycentric weights. Poles and zeros are then extracted via **zggev** (QZ algorithm for generalized eigenvalues). Both routines are translated from reference Fortran LAPACK into JavaScript as part of this project.
  </script>

  <script id="aaaCaseSelector" type="module">
    const aaaCaseChoice = view(Inputs.select(
      ['spiral', 'exp', 'tan', 'mero'],
      {
        label: 'AAA test case',
        format: v => ({
          exp: 'exp(z) on unit circle — [NST18] §3, Fig. 1 (test.js:93)',
          spiral: 'tan(πz/2) on spiral — [NST18] §3, Fig. 1 (test.js:111)',
          tan: 'tan(z) on unit circle — [NST18] §7.1, App 1 (test.js:153)',
          mero: 'log(2+z⁴)/(1−16z⁴) — [NST18] §7.3, App 3 (test.js:180)',
        })[v],
      }
    ));
  </script>

  <script id="aaaCompute" type="module">
    let Z = [], F = [], aaaSource, aaaDesc, truePoles = [];

    if (aaaCaseChoice === 'exp') {
      aaaSource = '[NST18] §3, Fig. 1; test.js:93';
      aaaDesc = '200 equispaced points on unit circle. Reference: 8 iterations, geometric convergence.';
      for (let i = 0; i < 200; i++) {
        const theta = 2 * Math.PI * i / 200;
        const cr = Math.cos(theta), ci = Math.sin(theta);
        Z.push([cr, ci]);
        F.push([Math.exp(cr) * Math.cos(ci), Math.exp(cr) * Math.sin(ci)]);
      }
    } else if (aaaCaseChoice === 'spiral') {
      aaaSource = '[NST18] §3, Fig. 1; test.js:111';
      aaaDesc = '1000 points on spiral winding 7½ times. Paper: m=12, poles ±1 to 15 digits.';
      truePoles = [[1, 0], [-1, 0], [3, 0], [-3, 0]];
      for (let i = 0; i < 1000; i++) {
        const t = i / 999;
        const lr = -0.5 + t, li = t * 15 * Math.PI;
        Z.push([Math.exp(lr) * Math.cos(li), Math.exp(lr) * Math.sin(li)]);
        const zr = Z[i][0], zi = Z[i][1];
        const a = Math.PI * zr / 2, b = Math.PI * zi / 2;
        const sinR = Math.sin(a) * Math.cosh(b), sinI = Math.cos(a) * Math.sinh(b);
        const cosR = Math.cos(a) * Math.cosh(b), cosI = -Math.sin(a) * Math.sinh(b);
        const d = cosR * cosR + cosI * cosI;
        F.push([(sinR * cosR + sinI * cosI) / d, (sinI * cosR - sinR * cosI) / d]);
      }
    } else if (aaaCaseChoice === 'tan') {
      aaaSource = '[NST18] §7.1, App 1; test.js:153';
      aaaDesc = '128 equispaced points on unit circle. Rational (7,7) beats degree-52 polynomial.';
      truePoles = [[Math.PI / 2, 0], [-Math.PI / 2, 0]];
      for (let i = 0; i < 128; i++) {
        const theta = 2 * Math.PI * i / 128;
        const zr = Math.cos(theta), zi = Math.sin(theta);
        Z.push([zr, zi]);
        const sinR = Math.sin(zr) * Math.cosh(zi), sinI = Math.cos(zr) * Math.sinh(zi);
        const cosR = Math.cos(zr) * Math.cosh(zi), cosI = -Math.sin(zr) * Math.sinh(zi);
        const d = cosR * cosR + cosI * cosI;
        F.push([(sinR * cosR + sinI * cosI) / d, (sinI * cosR - sinR * cosI) / d]);
      }
    } else {
      aaaSource = '[NST18] §7.3, App 3; test.js:180';
      aaaDesc = '1000 roots of unity. Meromorphic on unit disk. 4 poles at ±0.5, ±0.5i.';
      truePoles = [[0.5, 0], [-0.5, 0], [0, 0.5], [0, -0.5]];
      for (let i = 0; i < 1000; i++) {
        const theta = 2 * Math.PI * i / 1000;
        const zr = Math.cos(theta), zi = Math.sin(theta);
        Z.push([zr, zi]);
        const z2r = zr * zr - zi * zi, z2i = 2 * zr * zi;
        const z4r = z2r * z2r - z2i * z2i, z4i = 2 * z2r * z2i;
        const ar = 2 + z4r, ai = z4i;
        const logMag = Math.log(Math.hypot(ar, ai)), logArg = Math.atan2(ai, ar);
        const denR = 1 - 16 * z4r, denI = -16 * z4i;
        const d = denR * denR + denI * denI;
        F.push([(logMag * denR + logArg * denI) / d, (logArg * denR - logMag * denI) / d]);
      }
    }

    const aaaResponse = await workerCall({ type: 'aaa', Z, F, tol: 1e-13, mmax: 100 });
    const aaaResult = aaaResponse.result;
    const aaaComputeTime = aaaResponse.computeTime;
  </script>

  <script id="poleZeroPlot" type="module">
    const poleData = aaaResult.pol.map(([re, im]) => ({ re, im, type: 'pole' }));
    const zeroData = aaaResult.zer.map(([re, im]) => ({ re, im, type: 'zero' }));
    const trueData = truePoles.map(([re, im]) => ({ re, im }));
    const sampleData = Z.map(([re, im]) => ({ re, im }));

    const rangePts = [...sampleData, ...trueData];
    const pad = 0.3;
    let reMin = Infinity, reMax = -Infinity, imMin = Infinity, imMax = -Infinity;
    for (const p of rangePts) {
      if (p.re < reMin) reMin = p.re;
      if (p.re > reMax) reMax = p.re;
      if (p.im < imMin) imMin = p.im;
      if (p.im > imMax) imMax = p.im;
    }
    const span = Math.max(reMax - reMin, imMax - imMin);
    const reMid = (reMin + reMax) / 2, imMid = (imMin + imMax) / 2;
    const halfSpan = span / 2 * (1 + pad);

    const plotSize = Math.min(width, 540);

    display(Plot.plot({
      title: `Poles and zeros`,
      width: plotSize,
      height: plotSize,
      x: { label: 'Re(z)', domain: [reMid - halfSpan, reMid + halfSpan] },
      y: { label: 'Im(z)', domain: [imMid - halfSpan, imMid + halfSpan] },
      marks: [
        sampleData.length <= 1000
          ? Plot.dot(sampleData, { x: 're', y: 'im', fill: '#ccc', r: 2, stroke: '#aaa', strokeWidth: 0.5 })
          : null,
        Plot.dot(poleData, {
          x: 're', y: 'im',
          fill: 'rgba(220,50,50,0.85)', stroke: '#800', strokeWidth: 1, r: 3,
        }),
        Plot.dot(zeroData, {
          x: 're', y: 'im',
          fill: 'rgba(50,120,220,0.85)', stroke: '#036', strokeWidth: 1, r: 3,
        }),
      ].filter(Boolean),
    }));

    display(md`Red: poles. Blue: zeros.`);
  </script>

  <script id="laplaceHeader" type="text/markdown">
    ## Laplace Equation — [C20]

    Applying AAA to solve ${ tex`\nabla^2 u = 0` } on polygonal domains with Dirichlet boundary conditions, following Costa (2020). The smooth part is fit by polynomial least squares (**Householder QR**); the singular part uses AAA poles filtered to the domain exterior, re-fit via a second least-squares solve. The solution is evaluated per-pixel in a **WebGPU** fragment shader. Zoom and pan with the mouse.
  </script>

  <script id="laplaceControls" type="module">
    const caseChoice = view(Inputs.select(
      ['blade_x2', 'l_x2', 'l_rez2', 'l_reexp', 'l_ext_x2', 'square_x2'],
      {
        label: 'Test case',
        format: v => ({
          blade_x2: 'Blade, u = x² — [C20] §3.2',
          l_x2: 'L-shaped, u = x² — [C20] §3.1',
          l_rez2: 'L-shaped, u = Re(z²) — harmonic polynomial',
          l_reexp: 'L-shaped, u = Re(eᶻ) — entire function',
          l_ext_x2: 'L-shaped exterior, u = x² — [C20] §3.3',
          square_x2: 'Square, u = x² — smooth domain',
        })[v],
      }
    ));

    const mmaxChoice = view(Inputs.select(
      [50, 100, 150, 200],
      { label: 'mmax (AAA iterations)', value: 100 }
    ));
  </script>

  <script id="compute" type="module">
    let vertices, boundary, bv, valueRange, bcName, bcSource, center;

    let interior = true;

    if (caseChoice === 'l_x2' || caseChoice === 'l_rez2' || caseChoice === 'l_reexp') {
      vertices = [[0, 0], [2, 0], [2, 1], [1, 1], [1, 2], [0, 2]];
      boundary = buildLShapedBoundary(0.01);
      center = [0.5, 0.5];
      if (caseChoice === 'l_x2') {
        bv = boundary.map(([x]) => x * x);
        valueRange = [0, 4];
        bcName = 'u = x²';
        bcSource = '[C20] §3.1, L-shaped interior, u = x²';
      } else if (caseChoice === 'l_rez2') {
        bv = boundary.map(([x, y]) => x * x - y * y);
        valueRange = [-4, 4];
        bcName = 'u = Re(z²)';
        bcSource = 'L-shaped interior, harmonic polynomial BC';
      } else {
        bv = boundary.map(([x, y]) => Math.exp(x) * Math.cos(y));
        valueRange = [Math.min(...bv), Math.max(...bv)];
        bcName = 'u = Re(eᶻ)';
        bcSource = 'L-shaped interior, entire-function BC';
      }
    } else if (caseChoice === 'l_ext_x2') {
      // [C20] §3.3: L-shaped exterior — smooth part uses 1/(z-c)^n
      vertices = [[0, 0], [2, 0], [2, 1], [1, 1], [1, 2], [0, 2]];
      boundary = buildLShapedBoundary(0.01);
      center = [0.5, 0.5];
      interior = false;
      bv = boundary.map(([x]) => x * x);
      valueRange = [0, 4];
      bcName = 'u = x²';
      bcSource = '[C20] §3.3, L-shaped exterior, smooth = Σ aₙ/(z−c)ⁿ';
    } else if (caseChoice === 'blade_x2') {
      // [C20] §3.2: blade-shaped domain, 500 points
      boundary = buildBladeBoundary(500);
      vertices = boundary;
      center = [0, 0];
      bv = boundary.map(([x]) => x * x);
      valueRange = [0, 4];
      bcName = 'u = x²';
      bcSource = '[C20] §3.2, blade γ = 2cos(θ) + i(sin(θ) + 2cos³(θ))';
    } else {
      // Square domain
      vertices = [[0, 0], [2, 0], [2, 2], [0, 2]];
      boundary = buildSquareBoundary(0.01);
      center = [1, 1];
      bv = boundary.map(([x]) => x * x);
      valueRange = [0, 4];
      bcName = 'u = x²';
      bcSource = 'Square [0,2]², smooth domain (no corner singularity)';
    }

    const response = await workerCall({
      type: 'laplace',
      boundary, boundaryValues: bv, vertices,
      options: { center, interior, mmax: mmaxChoice },
    });

    const laplaceData = response.result;
    const computeTime = response.computeTime;
    const svdTime = response.timings.svd;
  </script>

  <script id="computeInfo" type="module">
    display(md`
**${bcName}** — *${bcSource}*
${laplaceData.smoothCoeffs.length} polynomial terms (N=${laplaceData.N}), ${laplaceData.poles.length} exterior poles (${(laplaceData.allPoles || []).length} total). Max boundary error: \`${laplaceData.maxError.toExponential(2)}\`. Computed in ${(computeTime / 1000).toFixed(1)}s (SVD: ${(svdTime / 1000).toFixed(1)}s).
    `);
  </script>

  <script id="stack" type="module">
    const pixelRatio = devicePixelRatio;

    const stack = createElementStack({
      layers: [{
        id: 'webgpu',
        element: ({ current, width, height }) => {
          let canvas, gpuContext;
          if (current) {
            canvas = current;
            gpuContext = canvas._gpuContext;
          } else {
            canvas = document.createElement('canvas');
            gpuContext = canvas.getContext('webgpu');
            canvas._gpuContext = gpuContext;
            gpuContext.configure({ device, format: canvasFormat });
            canvas.value = { device, context: gpuContext, format: canvasFormat };
          }
          canvas.width = Math.floor(width * pixelRatio);
          canvas.height = Math.floor(height * pixelRatio);
          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;
          canvas.style.position = 'absolute';
          canvas.style.top = '0';
          canvas.style.left = '0';
          gpuContext.configure({ device, format: canvasFormat });
          return canvas;
        }
      }, {
        id: 'plot',
        element: ({ width, height }) => createPlot(width, height)
      }, {
        id: 'svg',
        element: ({ current, width, height }) =>
          (current ? d3.select(current) : d3.create("svg"))
            .attr("width", width)
            .attr("height", height)
            .style("position", "absolute")
            .style("top", "0")
            .style("left", "0")
            .node()
      }],
      width: Math.min(width, 640),
      height: Math.min(width, 640),
    });
  </script>

  <script id="axes" type="module">
    const renderDirty = { value: true };

    const axes = createZoomableAxes({
      d3,
      element: stack.elements.svg,
      xScale: stack.elements.plot.scale("x"),
      yScale: stack.elements.plot.scale("y"),
      aspectRatio: 1,
      onChange: ({ xDomain, yDomain }) => {
        renderDirty.value = true;
        const newPlot = createPlot(stack.width, stack.height, xDomain, yDomain);
        stack.elements.plot.replaceWith(newPlot);
        stack.elements.plot = newPlot;
        stack.dispatchEvent(new CustomEvent('update'));
      }
    });
  </script>

  <script id="figure" type="module">
    const w = Math.min(width, 640);
    const h = w;

    const figure = html`<figure style="position:relative">
      ${stack.element}
      <figcaption>Scroll to zoom, drag to pan.</figcaption>
    </figure>`;

    stack.resize(w, h);
    axes.updateScales(
      stack.elements.plot.scale("x"),
      stack.elements.plot.scale("y")
    );
    renderDirty.value = true;

    display(figure);
  </script>

  <script id="poleOverlay" type="module">
    const svg = d3.select(stack.elements.svg);

    // Clip to plot area
    const defs = svg.selectAll('defs').data([0]).join('defs');
    defs.selectAll('clipPath#vp-clip')
      .data([0])
      .join('clipPath')
      .attr('id', 'vp-clip')
      .selectAll('rect')
      .data([0])
      .join('rect');

    const clipped = svg.selectAll('g.clipped')
      .data([0])
      .join('g')
      .attr('class', 'clipped')
      .attr('clip-path', 'url(#vp-clip)');

    // Pole markers (red)
    const poleMarkers = laplaceData.poles.map(([re, im]) => ({ re, im, type: 'pole' }));
    // Zero markers (blue)
    const zeroMarkers = (laplaceData.allZeros || []).map(([re, im]) => ({ re, im, type: 'zero' }));
    const allMarkers = [...poleMarkers, ...zeroMarkers];

    const dots = clipped.selectAll('circle.marker')
      .data(allMarkers)
      .join('circle')
      .attr('class', 'marker')
      .attr('r', d => d.type === 'pole' ? 3 : 2.5)
      .attr('fill', d => d.type === 'pole' ? 'rgba(220,50,50,0.85)' : 'rgba(50,120,220,0.85)')
      .attr('stroke', d => d.type === 'pole' ? '#800' : '#036')
      .attr('stroke-width', 1);

    function updatePositions() {
      const [x0, x1] = axes.xRange;
      const [y0, y1] = axes.yRange;
      defs.select('#vp-clip rect')
        .attr('x', Math.min(x0, x1))
        .attr('y', Math.min(y0, y1))
        .attr('width', Math.abs(x1 - x0))
        .attr('height', Math.abs(y1 - y0));

      dots
        .attr('cx', d => axes.xScale(d.re))
        .attr('cy', d => axes.yScale(d.im));
    }

    updatePositions();
    stack.addEventListener('update', updatePositions);
  </script>

  <script id="colorscale" type="module">
    const colorscaleSize = 256;
    const colorscaleData = new Uint8Array(colorscaleSize * 4);
    for (let i = 0; i < colorscaleSize; i++) {
      const t = i / (colorscaleSize - 1);
      const c = d3.color(d3.interpolateViridis(t));
      colorscaleData[i * 4 + 0] = c.r;
      colorscaleData[i * 4 + 1] = c.g;
      colorscaleData[i * 4 + 2] = c.b;
      colorscaleData[i * 4 + 3] = 255;
    }

    const colorscaleTexture = device.createTexture({
      label: 'colorscale',
      size: [colorscaleSize, 1],
      format: 'rgba8unorm',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
    });
    device.queue.writeTexture(
      { texture: colorscaleTexture },
      colorscaleData,
      { bytesPerRow: colorscaleSize * 4 },
      [colorscaleSize, 1]
    );

    const colorscaleSampler = device.createSampler({
      magFilter: 'linear',
      minFilter: 'linear',
      addressModeU: 'clamp-to-edge',
    });
  </script>

  <script id="buffers" type="module">
    function f32buf(data, usage) {
      const arr = new Float32Array(data.flat());
      const buf = device.createBuffer({
        size: Math.max(arr.byteLength, 4),
        usage: (usage || GPUBufferUsage.STORAGE) | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(buf, 0, arr);
      return buf;
    }

    const smoothBuf = f32buf(laplaceData.smoothCoeffs);
    const polesBuf = f32buf(laplaceData.poles);
    const singBuf = f32buf(laplaceData.singularCoeffs);
    const vertsBuf = f32buf(vertices);

    const nVertsBuf = device.createBuffer({
      size: 4,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });
    device.queue.writeBuffer(nVertsBuf, 0, new Uint32Array([vertices.length]));

    // Params: mat4x4 (64) + u32×2 (8) + vec2×2 (16) + f32×4 (16) = 104, padded to 112
    const paramsBuf = device.createBuffer({
      size: 112,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });
  </script>

  <script id="pipeline" type="module">
    import visualizeWGSL from './visualize.wgsl?raw';

    const fullscreenVertWGSL = `
      struct VertexOutput {
        @builtin(position) position: vec4<f32>,
        @location(0) uv: vec2<f32>,
      };
      @vertex
      fn main(@builtin(vertex_index) i: u32) -> VertexOutput {
        var pos = array<vec2<f32>, 4>(
          vec2<f32>(-1, -1), vec2<f32>(1, -1),
          vec2<f32>(-1, 1), vec2<f32>(1, 1)
        );
        var uv = array<vec2<f32>, 4>(
          vec2<f32>(-1, -1), vec2<f32>(1, -1),
          vec2<f32>(-1, 1), vec2<f32>(1, 1)
        );
        var out: VertexOutput;
        out.position = vec4<f32>(pos[i], 0, 1);
        out.uv = uv[i];
        return out;
      }
    `;

    const bindGroupLayout = device.createBindGroupLayout({
      entries: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
        { binding: 1, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
        { binding: 2, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
        { binding: 3, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
        { binding: 4, visibility: GPUShaderStage.FRAGMENT, texture: {} },
        { binding: 5, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
        { binding: 6, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
        { binding: 7, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
      ],
    });

    const renderPipeline = device.createRenderPipeline({
      layout: device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
      vertex: {
        module: device.createShaderModule({ label: 'fullscreen vert', code: fullscreenVertWGSL }),
        entryPoint: 'main',
      },
      fragment: {
        module: device.createShaderModule({ label: 'visualize frag', code: visualizeWGSL }),
        entryPoint: 'main',
        targets: [{ format: canvasFormat }],
      },
      primitive: { topology: 'triangle-strip' },
    });

    const bindGroup = device.createBindGroup({
      layout: bindGroupLayout,
      entries: [
        { binding: 0, resource: { buffer: paramsBuf } },
        { binding: 1, resource: { buffer: smoothBuf } },
        { binding: 2, resource: { buffer: polesBuf } },
        { binding: 3, resource: { buffer: singBuf } },
        { binding: 4, resource: colorscaleTexture.createView() },
        { binding: 5, resource: colorscaleSampler },
        { binding: 6, resource: { buffer: vertsBuf } },
        { binding: 7, resource: { buffer: nVertsBuf } },
      ],
    });
  </script>

  <script id="renderLoop" type="module">
    // Store current render state in a mutable object so the render loop
    // (which persists) can pick up new data without being recreated.
    const gpuContext = stack.elements.webgpu._gpuContext;
    const gpuCanvas = stack.elements.webgpu;

    // Mutable render state — updated by downstream cells
    if (!stack._renderState) {
      stack._renderState = { bindGroup: null, valueMin: 0, valueMax: 4, laplaceData: null };
    }
    const rs = stack._renderState;
    rs.bindGroup = bindGroup;
    rs.valueMin = valueRange[0];
    rs.valueMax = valueRange[1];
    rs.laplaceData = laplaceData;
    rs.interior = !laplaceData.exterior;

    // Signal a redraw since data changed
    renderDirty.value = true;

    function render() {
      if (!renderDirty.value) return;
      if (!rs.laplaceData || !rs.bindGroup) return;
      renderDirty.value = false;

      const ld = rs.laplaceData;

      const paramsData = new ArrayBuffer(112);
      const f32 = new Float32Array(paramsData);
      const u32 = new Uint32Array(paramsData);

      f32.set(axes.viewInverse, 0);          // mat4x4: 64 bytes
      u32[16] = ld.smoothCoeffs.length;      // nSmooth
      u32[17] = ld.poles.length;             // nPoles
      f32[18] = ld.center[0];               // center.x
      f32[19] = ld.center[1];               // center.y
      f32[20] = ld.b0[0];                   // b0.x
      f32[21] = ld.b0[1];                   // b0.y
      f32[22] = ld.imCorr;                  // imCorr
      f32[23] = rs.valueMin;                // valueMin
      f32[24] = rs.valueMax;                // valueMax
      f32[25] = rs.interior ? 1.0 : 0.0;   // interior flag

      device.queue.writeBuffer(paramsBuf, 0, f32);

      const vp = webgpuAxesViewport(axes, pixelRatio, gpuCanvas.height);

      const encoder = device.createCommandEncoder();
      const pass = encoder.beginRenderPass({
        colorAttachments: [{
          view: gpuContext.getCurrentTexture().createView(),
          clearValue: { r: 1, g: 1, b: 1, a: 1 },
          loadOp: 'clear',
          storeOp: 'store',
        }],
      });

      pass.setViewport(vp.x, vp.y, vp.width, vp.height, 0, 1);
      pass.setScissorRect(
        Math.round(vp.x), Math.round(vp.y),
        Math.round(vp.width), Math.round(vp.height)
      );
      pass.setPipeline(renderPipeline);
      pass.setBindGroup(0, rs.bindGroup);
      pass.draw(4);

      pass.end();
      device.queue.submit([encoder.finish()]);
    }

    // Persistent render loop — only created once via stack._animLoop
    if (!stack._animLoop) {
      function loop() {
        render();
        stack._animLoop = requestAnimationFrame(loop);
      }
      loop();
      invalidation.then(() => {
        cancelAnimationFrame(stack._animLoop);
        stack._animLoop = null;
      });
    }
  </script>

  <script id="stokesHeader" type="text/markdown">
    ## 2D Stokes Flow — [XWT23]

    Solving the biharmonic equation ${ tex`\nabla^4 \psi = 0` } for 2D Stokes flow via two Goursat functions ${ tex`f(z), g(z)` }, following Xue, Waters, Trefethen (2023). Lightning poles are exponentially clustered near each corner; the polynomial basis uses **Vandermonde with Arnoldi** orthogonalization [BT21] for numerical stability. The coupled system for both Goursat functions is solved in a single least-squares step. The stream function ${ tex`\psi` } is pre-evaluated on a grid (f64) and rendered via texture sampling.
  </script>

  <script id="stokesControls" type="module">
    const stokesN = view(Inputs.range([4, 36], {
      label: 'Poles per corner (N)',
      value: 24,
      step: 4,
    }));
    const stokesNPoly = view(Inputs.range([4, 30], {
      label: 'Polynomial degree',
      value: 20,
      step: 2,
    }));
  </script>

  <script id="stokesCompute" type="module">
    const stokesResponse = await workerCall({
      type: 'stokes',
      options: { N: stokesN, nPoly: stokesNPoly, nSample: 200, sigma: 2 },
    });
    const stokesData = stokesResponse.result;
    const stokesTime = stokesResponse.computeTime;
  </script>

  <script id="stokesInfo" type="module">
    display(md`
**Lid-driven cavity** ${ tex`[-1,1]^2` } — *[XWT23]*
${stokesData.nPoles} lightning poles (${stokesN}/corner), degree ${stokesData.nPoly} polynomial. Max boundary error: \`${stokesData.maxError.toExponential(2)}\`. Computed in ${(stokesTime / 1000).toFixed(2)}s.
    `);
  </script>

  <script id="stokesVis" type="module">
    const gridN = stokesData.gridN;
    const sPsiMin = stokesData.psiMin;
    const sPsiMax = stokesData.psiMax;
    const sDomMin = stokesData.domMin;
    const sDomMax = stokesData.domMax;

    // Upload ψ grid as R32Float texture
    const psiTexture = device.createTexture({
      label: 'stokes-psi',
      size: [gridN, gridN],
      format: 'r32float',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
    });
    device.queue.writeTexture(
      { texture: psiTexture },
      stokesData.psiGrid,
      { bytesPerRow: gridN * 4 },
      [gridN, gridN]
    );

    // Shader: viewInverse maps NDC to domain, then domain to texture UV
    const stokesShader = `
      struct VertexOutput {
        @builtin(position) position: vec4<f32>,
        @location(0) uv: vec2<f32>,
      };

      struct Params {
        viewInverse: mat4x4<f32>,
        psiMin: f32,
        psiMax: f32,
        domMin: vec2<f32>,
        domMax: vec2<f32>,
        _pad: vec2<f32>,
      };

      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var psi_texture: texture_2d<f32>;
      @group(0) @binding(2) var color_texture: texture_2d<f32>;
      @group(0) @binding(3) var color_sampler: sampler;

      @vertex
      fn vs(@builtin(vertex_index) i: u32) -> VertexOutput {
        var pos = array<vec2<f32>, 4>(
          vec2<f32>(-1, -1), vec2<f32>(1, -1),
          vec2<f32>(-1, 1), vec2<f32>(1, 1)
        );
        var out: VertexOutput;
        out.position = vec4<f32>(pos[i], 0, 1);
        out.uv = pos[i];
        return out;
      }

      @fragment
      fn fs(input: VertexOutput) -> @location(0) vec4<f32> {
        // Map NDC to domain via viewInverse
        let world = (params.viewInverse * vec4<f32>(input.uv, 0.0, 1.0)).xy;

        // Map domain to texture UV
        let texUV = (world - params.domMin) / (params.domMax - params.domMin);

        // Bilinear interpolation of r32float texture
        let texSize = vec2<f32>(textureDimensions(psi_texture));
        let tc = texUV * texSize - 0.5;
        let tc0 = vec2<i32>(floor(tc));
        let fr = fract(tc);
        let p00 = textureLoad(psi_texture, clamp(tc0, vec2<i32>(0), vec2<i32>(texSize) - 1), 0).r;
        let p10 = textureLoad(psi_texture, clamp(tc0 + vec2<i32>(1, 0), vec2<i32>(0), vec2<i32>(texSize) - 1), 0).r;
        let p01 = textureLoad(psi_texture, clamp(tc0 + vec2<i32>(0, 1), vec2<i32>(0), vec2<i32>(texSize) - 1), 0).r;
        let p11 = textureLoad(psi_texture, clamp(tc0 + vec2<i32>(1, 1), vec2<i32>(0), vec2<i32>(texSize) - 1), 0).r;
        let psi = mix(mix(p00, p10, fr.x), mix(p01, p11, fr.x), fr.y);

        let t = clamp((psi - params.psiMin) / (params.psiMax - params.psiMin), 0.0, 1.0);
        let color = textureSample(color_texture, color_sampler, vec2<f32>(t, 0.5));

        let nContours = 30.0;
        let interval = (params.psiMax - params.psiMin) / nContours;
        let dp_dx = dpdx(psi);
        let dp_dy = dpdy(psi);
        let grad = length(vec2<f32>(dp_dx, dp_dy));
        let dist = abs(fract(psi / interval - 0.5) - 0.5) * interval / grad;
        let alpha = 1.0 - smoothstep(0.5, 1.5, dist);

        if (world.x < -1.0 || world.x > 1.0 || world.y < -1.0 || world.y > 1.0) {
          return vec4<f32>(1.0, 1.0, 1.0, 1.0);
        }

        let final_color = mix(color.rgb, vec3<f32>(0.0, 0.0, 0.0), alpha * 0.5);
        return vec4<f32>(final_color, 1.0);
      }
    `;

    const sBGL = device.createBindGroupLayout({
      entries: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
        { binding: 1, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'unfilterable-float' } },
        { binding: 2, visibility: GPUShaderStage.FRAGMENT, texture: {} },
        { binding: 3, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
      ],
    });

    // Params: mat4x4 (64) + f32×2 (8) + vec2×2 (16) + vec2 pad (8) = 96
    const sParamsBuf = device.createBuffer({
      size: 96,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });

    const stokesPipeline = device.createRenderPipeline({
      layout: device.createPipelineLayout({ bindGroupLayouts: [sBGL] }),
      vertex: {
        module: device.createShaderModule({ label: 'stokes vert', code: stokesShader }),
        entryPoint: 'vs',
      },
      fragment: {
        module: device.createShaderModule({ label: 'stokes frag', code: stokesShader }),
        entryPoint: 'fs',
        targets: [{ format: canvasFormat }],
      },
      primitive: { topology: 'triangle-strip' },
    });

    const stokesBindGroup = device.createBindGroup({
      layout: sBGL,
      entries: [
        { binding: 0, resource: { buffer: sParamsBuf } },
        { binding: 1, resource: psiTexture.createView() },
        { binding: 2, resource: colorscaleTexture.createView() },
        { binding: 3, resource: colorscaleSampler },
      ],
    });
  </script>

  <script id="stokesCreatePlot" type="module">
    function createStokesPlot(width, height, xDomain = [-1.3, 1.3], yDomain = [-1.3, 1.3]) {
      return Plot.plot({
        width, height,
        marginTop: 10, marginRight: 10, marginLeft: 40, marginBottom: 30,
        style: { backgroundColor: "transparent", maxWidth: "none", position: "absolute" },
        x: { domain: xDomain, tickSpacing: 80, label: "Re(z)" },
        y: { domain: yDomain, tickSpacing: 80, label: "Im(z)" },
        marks: [
          Plot.ruleX([0], { stroke: "#0003" }),
          Plot.ruleY([0], { stroke: "#0003" }),
        ],
      });
    }
  </script>

  <script id="stokesStack" type="module">
    const sPixelRatio = devicePixelRatio;

    const sStack = createElementStack({
      layers: [{
        id: 'webgpu',
        element: ({ current, width, height }) => {
          let canvas, ctx;
          if (current) { canvas = current; ctx = canvas._gpuContext; }
          else {
            canvas = document.createElement('canvas');
            ctx = canvas.getContext('webgpu');
            canvas._gpuContext = ctx;
            ctx.configure({ device, format: canvasFormat });
          }
          canvas.width = Math.floor(width * sPixelRatio);
          canvas.height = Math.floor(height * sPixelRatio);
          canvas.style.cssText = `width:${width}px;height:${height}px;position:absolute;top:0;left:0`;
          ctx.configure({ device, format: canvasFormat });
          return canvas;
        }
      }, {
        id: 'plot',
        element: ({ width, height }) => createStokesPlot(width, height)
      }, {
        id: 'svg',
        element: ({ current, width, height }) =>
          (current ? d3.select(current) : d3.create("svg"))
            .attr("width", width).attr("height", height)
            .style("position", "absolute").style("top", "0").style("left", "0")
            .node()
      }],
      width: Math.min(width, 540),
      height: Math.min(width, 540),
    });
  </script>

  <script id="stokesAxes" type="module">
    const sRenderDirty = { value: true };

    const sAxes = createZoomableAxes({
      d3,
      element: sStack.elements.svg,
      xScale: sStack.elements.plot.scale("x"),
      yScale: sStack.elements.plot.scale("y"),
      aspectRatio: 1,
      onChange: ({ xDomain, yDomain }) => {
        sRenderDirty.value = true;
        const newPlot = createStokesPlot(sStack.width, sStack.height, xDomain, yDomain);
        sStack.elements.plot.replaceWith(newPlot);
        sStack.elements.plot = newPlot;
        sStack.dispatchEvent(new CustomEvent('update'));
      }
    });
  </script>

  <script id="stokesFigure" type="module">
    const sw = Math.min(width, 540);

    const stokesFigure = html`<figure style="position:relative">
      ${sStack.element}
      <figcaption>Scroll to zoom, drag to pan.</figcaption>
    </figure>`;

    sStack.resize(sw, sw);
    sAxes.updateScales(
      sStack.elements.plot.scale("x"),
      sStack.elements.plot.scale("y")
    );
    sRenderDirty.value = true;

    display(stokesFigure);
  </script>

  <script id="stokesPoleOverlay" type="module">
    const sSvg = d3.select(sStack.elements.svg);
    const sDefs = sSvg.selectAll('defs').data([0]).join('defs');
    sDefs.selectAll('clipPath#svp-clip').data([0]).join('clipPath')
      .attr('id', 'svp-clip').selectAll('rect').data([0]).join('rect');
    const sClipped = sSvg.selectAll('g.clipped').data([0]).join('g')
      .attr('class', 'clipped').attr('clip-path', 'url(#svp-clip)');

    const sPoleMarkers = stokesData.poles.map(([re, im]) => ({ re, im }));
    const sDots = sClipped.selectAll('circle.marker')
      .data(sPoleMarkers).join('circle')
      .attr('class', 'marker').attr('r', 3)
      .attr('fill', 'rgba(220,50,50,0.85)').attr('stroke', '#800').attr('stroke-width', 1);

    function sUpdatePositions() {
      const [x0, x1] = sAxes.xRange;
      const [y0, y1] = sAxes.yRange;
      sDefs.select('#svp-clip rect')
        .attr('x', Math.min(x0,x1)).attr('y', Math.min(y0,y1))
        .attr('width', Math.abs(x1-x0)).attr('height', Math.abs(y1-y0));
      sDots.attr('cx', d => sAxes.xScale(d.re)).attr('cy', d => sAxes.yScale(d.im));
    }
    sUpdatePositions();
    sStack.addEventListener('update', sUpdatePositions);
  </script>

  <script id="stokesRenderLoop" type="module">
    const sGpuCtx = sStack.elements.webgpu._gpuContext;
    const sGpuCanvas = sStack.elements.webgpu;

    function sRender() {
      if (!sRenderDirty.value) return;
      sRenderDirty.value = false;

      const sp = new ArrayBuffer(96);
      const sf = new Float32Array(sp);
      sf.set(sAxes.viewInverse, 0);  // mat4x4 at offset 0
      sf[16] = sPsiMin;              // psiMin
      sf[17] = sPsiMax;              // psiMax
      sf[18] = sDomMin[0];           // domMin.x
      sf[19] = sDomMin[1];           // domMin.y
      sf[20] = sDomMax[0];           // domMax.x
      sf[21] = sDomMax[1];           // domMax.y
      device.queue.writeBuffer(sParamsBuf, 0, sf);

      const vp = webgpuAxesViewport(sAxes, sPixelRatio, sGpuCanvas.height);
      const enc = device.createCommandEncoder();
      const pass = enc.beginRenderPass({
        colorAttachments: [{
          view: sGpuCtx.getCurrentTexture().createView(),
          clearValue: { r: 1, g: 1, b: 1, a: 1 },
          loadOp: 'clear', storeOp: 'store',
        }],
      });
      pass.setViewport(vp.x, vp.y, vp.width, vp.height, 0, 1);
      pass.setScissorRect(Math.round(vp.x), Math.round(vp.y), Math.round(vp.width), Math.round(vp.height));
      pass.setPipeline(stokesPipeline);
      pass.setBindGroup(0, stokesBindGroup);
      pass.draw(4);
      pass.end();
      device.queue.submit([enc.finish()]);
    }

    if (!sStack._sAnimLoop) {
      function sLoop() { sRender(); sStack._sAnimLoop = requestAnimationFrame(sLoop); }
      sLoop();
      invalidation.then(() => { cancelAnimationFrame(sStack._sAnimLoop); sStack._sAnimLoop = null; });
    }
  </script>
