  <title>Potential Flow over NACA Airfoils</title>

  <script id="intro" type="text/markdown">
    # Potential Flow over NACA Airfoils

    This notebook computes potential flow past NACA 4-digit airfoils using a rational function solver inspired by the **lightning method** (Baddoo 2020, Gopal & Trefethen 2019). The solution uses **Vandermonde with Arnoldi** orthogonalization for the polynomial basis and enforces the **Kutta condition** at the trailing edge to determine the circulation and lift.

    All computation (solver + grid evaluation) runs in a web worker. The flow field is rendered as a texture with streamline contours via **WebGPU**.

    **References:**
    - **[B20]** Baddoo, ["Lightning Solvers for Potential Flows"](https://doi.org/10.3390/fluids5040227), Fluids 5(4), 2020.
    - **[GT19]** Gopal, Trefethen, ["Solving Laplace problems with corner singularities via rational functions"](https://doi.org/10.1137/19M125947X), SIAM J. Numer. Anal. 57(5), 2019.
    - **[BT21]** Brubeck, Trefethen, ["Vandermonde with Arnoldi"](https://doi.org/10.1137/19M1259548), SIAM Review 63(2), 2021.
  </script>

  <script id="imports" type="module">
    import { createElementStack } from '../lib/element-stack.js';
    import { createZoomableAxes } from '../lib/zoomable-axes.js';
    import { webgpuAxesViewport } from '../lib/webgpu-canvas.js';
  </script>

  <script id="gpu" type="module">
    const adapter = await navigator.gpu?.requestAdapter();
    if (!adapter) throw new Error('WebGPU not available');
    const device = await adapter.requestDevice();
    const canvasFormat = navigator.gpu.getPreferredCanvasFormat();
  </script>

  <script id="colorscale" type="module">
    // Viridis colorscale (256 entries)
    function viridis(t) {
      const c0 = [0.2777, 0.0054, 0.3340];
      const c1 = [0.1050, 1.4046, -0.3230];
      const c2 = [-0.3308, 0.2148, 1.6614];
      const c3 = [-4.6342, -5.7991, -19.3324];
      const c4 = [6.2282, 14.1799, 56.6905];
      const c5 = [4.7763, -13.7451, -65.3530];
      const c6 = [-5.4354, 4.6456, 26.3124];
      const r = c0[0]+t*(c1[0]+t*(c2[0]+t*(c3[0]+t*(c4[0]+t*(c5[0]+t*c6[0])))));
      const g = c0[1]+t*(c1[1]+t*(c2[1]+t*(c3[1]+t*(c4[1]+t*(c5[1]+t*c6[1])))));
      const b = c0[2]+t*(c1[2]+t*(c2[2]+t*(c3[2]+t*(c4[2]+t*(c5[2]+t*c6[2])))));
      return [Math.max(0,Math.min(1,r)), Math.max(0,Math.min(1,g)), Math.max(0,Math.min(1,b))];
    }
    const colorData = new Uint8Array(256 * 4);
    for (let i = 0; i < 256; i++) {
      const [r, g, b] = viridis(i / 255);
      colorData[i*4] = Math.round(r*255);
      colorData[i*4+1] = Math.round(g*255);
      colorData[i*4+2] = Math.round(b*255);
      colorData[i*4+3] = 255;
    }
    const colorscaleTexture = device.createTexture({
      size: [256, 1], format: 'rgba8unorm',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
    });
    device.queue.writeTexture({ texture: colorscaleTexture }, colorData, { bytesPerRow: 256 * 4 }, [256, 1]);
    const colorscaleSampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
  </script>

  <script id="worker" type="module">
    const worker = new Worker(new URL('./worker.js', import.meta.url), { type: 'module' });
    let _nextId = 0;
    const _pending = new Map();
    worker.onmessage = (e) => {
      const { id } = e.data;
      const resolve = _pending.get(id);
      if (resolve) { _pending.delete(id); resolve(e.data); }
    };
    function workerCall(msg) {
      return new Promise(resolve => {
        const id = _nextId++;
        _pending.set(id, resolve);
        worker.postMessage({ ...msg, id });
      });
    }
    invalidation.then(() => worker.terminate());
  </script>

  <script id="controls" type="module">
    const digitsChoice = view(Inputs.select(
      ['0012', '2412', '4412', '0024', '6412'],
      { label: 'NACA airfoil', value: '2412' }
    ));
    const alphaChoice = view(Inputs.range([-5, 15], {
      label: 'Angle of attack (°)', value: 5, step: 0.5
    }));
    const nPolyChoice = view(Inputs.range([8, 30], {
      label: 'Polynomial degree', value: 20, step: 2
    }));
  </script>

  <script id="compute" type="module">
    const response = await workerCall({
      type: 'naca',
      options: {
        digits: digitsChoice,
        alpha: alphaChoice,
        nPoly: nPolyChoice,
        nPoints: 400,
        nPoles: 0,
        gridN: 512,
      },
    });
    const data = response.result;
  </script>

  <script id="info" type="module">
    display(md`
**NACA ${data.digits}** at ${ tex`\\alpha = ${data.alpha}°` } — ${ tex`C_L = ${data.CL.toFixed(4)}` }, ${ tex`\\Gamma = ${data.Gamma.toFixed(4)}` }. Boundary error: \`${data.maxError.toExponential(2)}\`. Solved in ${(response.solveTime / 1000).toFixed(2)}s, grid evaluated in ${(response.gridTime / 1000).toFixed(2)}s.
    `);
  </script>

  <script id="visSetup" type="module">
    const gridN = data.gridN;

    function createF32Texture(label, buf) {
      const tex = device.createTexture({
        label, size: [gridN, gridN], format: 'r32float',
        usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
      });
      device.queue.writeTexture({ texture: tex }, buf, { bytesPerRow: gridN * 4 }, [gridN, gridN]);
      return tex;
    }
    const psiTexture = createF32Texture('psi', data.psiGrid);
    const speedTexture = createF32Texture('speed', data.speedGrid);
    const maskTexture = createF32Texture('mask', data.maskGrid);

    const shaderCode = `
      struct VertexOutput {
        @builtin(position) position: vec4<f32>,
        @location(0) uv: vec2<f32>,
      };
      struct Params {
        viewInverse: mat4x4<f32>,
        psiMin: f32,
        psiMax: f32,
        domMin: vec2<f32>,
        domMax: vec2<f32>,
        speedMax: f32,
        _pad: f32,
      };
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var psi_tex: texture_2d<f32>;
      @group(0) @binding(2) var speed_tex: texture_2d<f32>;
      @group(0) @binding(3) var mask_tex: texture_2d<f32>;
      @group(0) @binding(4) var color_tex: texture_2d<f32>;
      @group(0) @binding(5) var color_samp: sampler;

      fn bilinear(tex: texture_2d<f32>, uv: vec2<f32>) -> f32 {
        let sz = vec2<f32>(textureDimensions(tex));
        let tc = uv * sz - 0.5;
        let tc0 = vec2<i32>(floor(tc));
        let fr = fract(tc);
        let mx = vec2<i32>(sz) - 1;
        let a = textureLoad(tex, clamp(tc0, vec2<i32>(0), mx), 0).r;
        let b = textureLoad(tex, clamp(tc0 + vec2<i32>(1,0), vec2<i32>(0), mx), 0).r;
        let c = textureLoad(tex, clamp(tc0 + vec2<i32>(0,1), vec2<i32>(0), mx), 0).r;
        let d = textureLoad(tex, clamp(tc0 + vec2<i32>(1,1), vec2<i32>(0), mx), 0).r;
        return mix(mix(a, b, fr.x), mix(c, d, fr.x), fr.y);
      }

      @vertex fn vs(@builtin(vertex_index) i: u32) -> VertexOutput {
        var pos = array<vec2<f32>, 4>(
          vec2<f32>(-1, -1), vec2<f32>(1, -1),
          vec2<f32>(-1, 1), vec2<f32>(1, 1)
        );
        var out: VertexOutput;
        out.position = vec4<f32>(pos[i], 0, 1);
        out.uv = pos[i];
        return out;
      }

      @fragment fn fs(input: VertexOutput) -> @location(0) vec4<f32> {
        let world = (params.viewInverse * vec4<f32>(input.uv, 0.0, 1.0)).xy;
        let texUV = (world - params.domMin) / (params.domMax - params.domMin);
        let uv = clamp(texUV, vec2<f32>(0.0), vec2<f32>(1.0));

        let psi = bilinear(psi_tex, uv);
        let speed = bilinear(speed_tex, uv);
        let mask = bilinear(mask_tex, uv);

        // Color by speed
        let t = clamp(speed / params.speedMax, 0.0, 1.0);
        let color = textureSample(color_tex, color_samp, vec2<f32>(t, 0.5));

        // Streamline contours
        let nContours = 40.0;
        let interval = (params.psiMax - params.psiMin) / nContours;
        let grad = length(vec2<f32>(dpdx(psi), dpdy(psi)));
        let dist = abs(fract(psi / interval - 0.5) - 0.5) * interval / max(grad, 1e-8);
        let contour_alpha = 1.0 - smoothstep(0.5, 1.5, dist);

        let flow_color = mix(color.rgb, vec3<f32>(0.0), contour_alpha * 0.5);

        // Inside airfoil → dark gray fill
        let airfoil_color = vec3<f32>(0.25, 0.25, 0.3);
        let result = mix(airfoil_color, flow_color, mask);

        // Outside domain → light gray
        let oob = texUV.x < 0.0 || texUV.x > 1.0 || texUV.y < 0.0 || texUV.y > 1.0;
        let final_color = select(result, vec3<f32>(0.95), oob);
        return vec4<f32>(final_color, 1.0);
      }
    `;

    const bgl = device.createBindGroupLayout({
      entries: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT | GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
        { binding: 1, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'unfilterable-float' } },
        { binding: 2, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'unfilterable-float' } },
        { binding: 3, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'unfilterable-float' } },
        { binding: 4, visibility: GPUShaderStage.FRAGMENT, texture: {} },
        { binding: 5, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
      ],
    });

    const paramsBuf = device.createBuffer({
      size: 96, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });

    const shaderModule = device.createShaderModule({ label: 'naca', code: shaderCode });
    const pipeline = device.createRenderPipeline({
      layout: device.createPipelineLayout({ bindGroupLayouts: [bgl] }),
      vertex: { module: shaderModule, entryPoint: 'vs' },
      fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format: canvasFormat }] },
      primitive: { topology: 'triangle-strip' },
    });

    const bindGroup = device.createBindGroup({
      layout: bgl,
      entries: [
        { binding: 0, resource: { buffer: paramsBuf } },
        { binding: 1, resource: psiTexture.createView() },
        { binding: 2, resource: speedTexture.createView() },
        { binding: 3, resource: maskTexture.createView() },
        { binding: 4, resource: colorscaleTexture.createView() },
        { binding: 5, resource: colorscaleSampler },
      ],
    });
  </script>

  <script id="createPlot" type="module">
    function createNacaPlot(w, h, xDomain = [-0.5, 1.5], yDomain = [-0.8, 0.8]) {
      return Plot.plot({
        width: w, height: h,
        marginTop: 10, marginRight: 10, marginLeft: 40, marginBottom: 30,
        style: { backgroundColor: "transparent", maxWidth: "none", position: "absolute" },
        x: { domain: xDomain, tickSpacing: 80, label: "x" },
        y: { domain: yDomain, tickSpacing: 80, label: "y" },
        marks: [
          Plot.line(data.boundary.concat([data.boundary[0]]), {
            x: d => d[0], y: d => d[1],
            stroke: "#000", strokeWidth: 1.5,
          }),
        ],
      });
    }
  </script>

  <script id="stack" type="module">
    const pixelRatio = devicePixelRatio;
    const plotW = Math.min(width, 720);
    const plotH = Math.round(plotW * 0.6);

    const stack = createElementStack({
      layers: [{
        id: 'webgpu',
        element: ({ current, width, height }) => {
          let canvas, ctx;
          if (current) { canvas = current; ctx = canvas._gpuContext; }
          else {
            canvas = document.createElement('canvas');
            ctx = canvas.getContext('webgpu');
            canvas._gpuContext = ctx;
          }
          canvas.width = Math.floor(width * pixelRatio);
          canvas.height = Math.floor(height * pixelRatio);
          canvas.style.cssText = `width:${width}px;height:${height}px;position:absolute;top:0;left:0`;
          ctx.configure({ device, format: canvasFormat });
          return canvas;
        }
      }, {
        id: 'plot',
        element: ({ width, height }) => createNacaPlot(width, height)
      }, {
        id: 'svg',
        element: ({ current, width, height }) =>
          (current ? d3.select(current) : d3.create("svg"))
            .attr("width", width).attr("height", height)
            .style("position", "absolute").style("top", "0").style("left", "0")
            .node()
      }],
      width: plotW, height: plotH,
    });
  </script>

  <script id="axes" type="module">
    const renderDirty = { value: true };
    const axes = createZoomableAxes({
      d3,
      element: stack.elements.svg,
      xScale: stack.elements.plot.scale("x"),
      yScale: stack.elements.plot.scale("y"),
      aspectRatio: plotW / plotH,
      onChange: ({ xDomain, yDomain }) => {
        renderDirty.value = true;
        const newPlot = createNacaPlot(stack.width, stack.height, xDomain, yDomain);
        stack.elements.plot.replaceWith(newPlot);
        stack.elements.plot = newPlot;
        stack.dispatchEvent(new CustomEvent('update'));
      }
    });
  </script>

  <script id="figure" type="module">
    const figure = html`<figure style="position:relative">
      ${stack.element}
      <figcaption>Scroll to zoom, drag to pan. Color shows speed; black lines are streamlines.</figcaption>
    </figure>`;
    stack.resize(plotW, plotH);
    axes.updateScales(stack.elements.plot.scale("x"), stack.elements.plot.scale("y"));
    renderDirty.value = true;
    display(figure);
  </script>

  <script id="renderLoop" type="module">
    const gpuCtx = stack.elements.webgpu._gpuContext;
    const gpuCanvas = stack.elements.webgpu;

    function render() {
      if (!renderDirty.value) return;
      renderDirty.value = false;

      const p = new Float32Array(24); // 96 bytes = 24 floats
      p.set(axes.viewInverse, 0);     // mat4x4 at offset 0
      p[16] = data.psiMin;
      p[17] = data.psiMax;
      p[18] = data.domMin[0];
      p[19] = data.domMin[1];
      p[20] = data.domMax[0];
      p[21] = data.domMax[1];
      p[22] = data.speedMax * 0.8;    // scale so freestream ~0.5 in colormap
      device.queue.writeBuffer(paramsBuf, 0, p);

      const vp = webgpuAxesViewport(axes, pixelRatio, gpuCanvas.height);
      const enc = device.createCommandEncoder();
      const pass = enc.beginRenderPass({
        colorAttachments: [{
          view: gpuCtx.getCurrentTexture().createView(),
          clearValue: { r: 0.95, g: 0.95, b: 0.95, a: 1 },
          loadOp: 'clear', storeOp: 'store',
        }],
      });
      pass.setViewport(vp.x, vp.y, vp.width, vp.height, 0, 1);
      pass.setScissorRect(Math.round(vp.x), Math.round(vp.y), Math.round(vp.width), Math.round(vp.height));
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.draw(4);
      pass.end();
      device.queue.submit([enc.finish()]);
    }

    if (!stack._nacaAnimLoop) {
      function loop() { render(); stack._nacaAnimLoop = requestAnimationFrame(loop); }
      loop();
      invalidation.then(() => { cancelAnimationFrame(stack._nacaAnimLoop); stack._nacaAnimLoop = null; });
    }
  </script>

  <script id="clPlot" type="text/markdown">
    ### Lift Coefficient vs Angle of Attack
  </script>

  <script id="clSweep" type="module">
    // Compute CL sweep in the worker
    const clData = [];
    for (let a = -5; a <= 15; a += 1) {
      const r = await workerCall({
        type: 'naca',
        options: { digits: digitsChoice, alpha: a, nPoly: nPolyChoice, nPoints: 400, nPoles: 0, gridN: 2 },
      });
      clData.push({ alpha: a, CL: r.result.CL });
    }

    display(Plot.plot({
      width: Math.min(width, 500),
      height: 300,
      x: { label: 'α (degrees)' },
      y: { label: 'CL', grid: true },
      marks: [
        Plot.line(clData, { x: 'alpha', y: 'CL', stroke: '#2563eb', strokeWidth: 2 }),
        Plot.dot(clData, { x: 'alpha', y: 'CL', fill: '#2563eb', r: 3 }),
        Plot.ruleY([0], { stroke: '#0003' }),
        // Thin airfoil theory: CL = 2π sin(α)
        Plot.line(clData.map(d => ({ alpha: d.alpha, CL: 2 * Math.PI * Math.sin(d.alpha * Math.PI / 180) })), {
          x: 'alpha', y: 'CL', stroke: '#999', strokeDasharray: '4,4', strokeWidth: 1,
        }),
      ],
    }));
    display(md`Blue: computed. Dashed gray: thin airfoil theory ${ tex`C_L = 2\\pi\\sin\\alpha` }.`);
  </script>
