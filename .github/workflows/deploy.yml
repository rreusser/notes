name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'blahpack/notebooks/**'
      - 'blahpack/examples/**'
      - 'blahpack/aaa-pure.js'
      - 'blahpack/prz.js'
      - 'blahpack/qz.js'
      - 'blahpack/lib/**'
      - 'blahpack/vite.config.js'
      - 'blahpack/package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blahpack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blahpack/package-lock.json

      - run: npm ci

      - name: Bundle notebook dependencies
        run: npm run bundle:notebook

      - name: Build
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: blahpack/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
