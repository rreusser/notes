name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'notebooks/**'
      - 'examples/**'
      - 'lib/**'
      - 'progress.html'
      - 'vite.config.js'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Bundle the Node-only notebook deps esbuild can resolve but the
      # in-browser notebooks cannot. All three notebook entry points are
      # vite build inputs, so all must be fresh or the build fails.
      - name: Bundle notebook dependencies
        run: |
          npm run bundle:notebook
          npm run bundle:naca
          npm run bundle:pseudospectra

      - name: Build
        run: npx vite build
        env:
          BASE_URL: /notes/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
