  <title>Lightning Solver for Potential Flows</title>

  <script id="intro" type="text/markdown">
    # Lightning Solver for Potential Flows

    This notebook computes potential flow past polygonal bodies using the **lightning method** (Gopal & Trefethen 2019, Baddoo 2020). The solution represents the complex potential as a **rational function** with poles exponentially clustered near corners, achieving root-exponential convergence. The polynomial (Runge) part uses **Vandermonde with Arnoldi** orthogonalization for numerical stability.

    All computation runs in a web worker. The flow field is rendered via **WebGPU** with streamline contours.

    **References:**
    - **[GT19]** Gopal, Trefethen, ["Solving Laplace problems with corner singularities via rational functions"](https://doi.org/10.1137/19M125947X), 2019.
    - **[B20]** Baddoo, ["Lightning Solvers for Potential Flows"](https://doi.org/10.3390/fluids5040227), 2020.
    - **[BT21]** Brubeck, Trefethen, ["Vandermonde with Arnoldi"](https://dl.acm.org/doi/abs/10.1137/19M130100X), SIAM Review 63(2), 2021.
  </script>

  <script id="imports" type="module">
    import { createElementStack } from '../lib/element-stack.js';
    import { createZoomableAxes } from '../lib/zoomable-axes.js';
    import { webgpuAxesViewport } from '../lib/webgpu-canvas.js';
  </script>

  <script id="gpu" type="module">
    const adapter = await navigator.gpu?.requestAdapter();
    if (!adapter) throw new Error('WebGPU not available');
    const device = await adapter.requestDevice();
    const canvasFormat = navigator.gpu.getPreferredCanvasFormat();
  </script>

  <script id="colorscale" type="module">
    // Viridis colorscale
    function viridis(t) {
      const c0=[0.2777,0.0054,0.334],c1=[0.105,1.4046,-0.323],c2=[-0.3308,0.2148,1.6614];
      const c3=[-4.6342,-5.7991,-19.3324],c4=[6.2282,14.1799,56.6905];
      const c5=[4.7763,-13.7451,-65.353],c6=[-5.4354,4.6456,26.3124];
      const r=c0[0]+t*(c1[0]+t*(c2[0]+t*(c3[0]+t*(c4[0]+t*(c5[0]+t*c6[0])))));
      const g=c0[1]+t*(c1[1]+t*(c2[1]+t*(c3[1]+t*(c4[1]+t*(c5[1]+t*c6[1])))));
      const b=c0[2]+t*(c1[2]+t*(c2[2]+t*(c3[2]+t*(c4[2]+t*(c5[2]+t*c6[2])))));
      return [Math.max(0,Math.min(1,r)),Math.max(0,Math.min(1,g)),Math.max(0,Math.min(1,b))];
    }
    const colorData = new Uint8Array(256*4);
    for (let i=0;i<256;i++){const[r,g,b]=viridis(i/255);colorData[i*4]=r*255|0;colorData[i*4+1]=g*255|0;colorData[i*4+2]=b*255|0;colorData[i*4+3]=255;}
    const colorscaleTexture = device.createTexture({size:[256,1],format:'rgba8unorm',usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST});
    device.queue.writeTexture({texture:colorscaleTexture},colorData,{bytesPerRow:256*4},[256,1]);
    const colorscaleSampler = device.createSampler({magFilter:'linear',minFilter:'linear'});
  </script>

  <script id="worker" type="module">
    const worker = new Worker(new URL('./worker.js', import.meta.url), {type:'module'});
    let _nextId=0; const _pending=new Map();
    worker.onmessage=(e)=>{const{id}=e.data;const resolve=_pending.get(id);if(resolve){_pending.delete(id);resolve(e.data);}};
    function workerCall(msg){return new Promise(resolve=>{const id=_nextId++;_pending.set(id,resolve);worker.postMessage({...msg,id});});}
    invalidation.then(()=>worker.terminate());
  </script>

  <script id="controls" type="module">
    const mmaxChoice = view(Inputs.range([50, 300], {label: 'AAA iterations (mmax)', value: 200, step: 50}));
  </script>

  <script id="compute" type="module">
    const response = await workerCall({
      type: 'square',
      options: { mmax: mmaxChoice, nSample: 300, gridN: 512 },
    });
    const data = response.result;
  </script>

  <script id="info" type="module">
    display(md`
**Uniform flow past a square** — ${data.poles.length} AAA poles (mmax=${mmaxChoice}). Boundary error: \`${data.maxError.toExponential(2)}\`. Solved in ${(response.solveTime/1000).toFixed(2)}s, grid in ${(response.gridTime/1000).toFixed(2)}s.
    `);
  </script>

  <script id="visSetup" type="module">
    const gridN = data.gridN;
    function createF32Texture(label, buf) {
      const tex = device.createTexture({label,size:[gridN,gridN],format:'r32float',usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST});
      device.queue.writeTexture({texture:tex},buf,{bytesPerRow:gridN*4},[gridN,gridN]);
      return tex;
    }
    const psiTexture = createF32Texture('psi', data.psiGrid);
    const maskTexture = createF32Texture('mask', data.maskGrid);

    const shaderCode = `
      struct VertexOutput { @builtin(position) position: vec4<f32>, @location(0) uv: vec2<f32> };
      struct Params {
        viewInverse: mat4x4<f32>,
        psiMin: f32, psiMax: f32,
        domMin: vec2<f32>, domMax: vec2<f32>,
        _pad: vec2<f32>,
      };
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var psi_tex: texture_2d<f32>;
      @group(0) @binding(2) var mask_tex: texture_2d<f32>;
      @group(0) @binding(3) var color_tex: texture_2d<f32>;
      @group(0) @binding(4) var color_samp: sampler;

      fn bilinear(tex: texture_2d<f32>, uv: vec2<f32>) -> f32 {
        let sz = vec2<f32>(textureDimensions(tex));
        let tc = uv * sz - 0.5;
        let tc0 = vec2<i32>(floor(tc));
        let fr = fract(tc);
        let mx = vec2<i32>(sz) - 1;
        let a = textureLoad(tex, clamp(tc0, vec2<i32>(0), mx), 0).r;
        let b = textureLoad(tex, clamp(tc0+vec2<i32>(1,0), vec2<i32>(0), mx), 0).r;
        let c = textureLoad(tex, clamp(tc0+vec2<i32>(0,1), vec2<i32>(0), mx), 0).r;
        let d = textureLoad(tex, clamp(tc0+vec2<i32>(1,1), vec2<i32>(0), mx), 0).r;
        return mix(mix(a,b,fr.x), mix(c,d,fr.x), fr.y);
      }

      @vertex fn vs(@builtin(vertex_index) i: u32) -> VertexOutput {
        var pos = array<vec2<f32>,4>(vec2(-1.,-1.),vec2(1.,-1.),vec2(-1.,1.),vec2(1.,1.));
        var out: VertexOutput; out.position = vec4<f32>(pos[i],0,1); out.uv = pos[i]; return out;
      }

      @fragment fn fs(input: VertexOutput) -> @location(0) vec4<f32> {
        let world = (params.viewInverse * vec4<f32>(input.uv, 0.0, 1.0)).xy;
        let uv = clamp((world - params.domMin) / (params.domMax - params.domMin), vec2(0.0), vec2(1.0));

        let psi = bilinear(psi_tex, uv);
        let mask = bilinear(mask_tex, uv);

        // Color by ψ value
        let t = clamp((psi - params.psiMin) / (params.psiMax - params.psiMin), 0.0, 1.0);
        let color = textureSample(color_tex, color_samp, vec2<f32>(t, 0.5));

        // Streamline contours
        let nContours = 30.0;
        let interval = (params.psiMax - params.psiMin) / nContours;
        let grad = length(vec2<f32>(dpdx(psi), dpdy(psi)));
        let dist = abs(fract(psi / interval - 0.5) - 0.5) * interval / max(grad, 1e-8);
        let contour_alpha = 1.0 - smoothstep(0.5, 1.5, dist);

        let flow_color = mix(color.rgb, vec3(0.0), contour_alpha * 0.5);
        let body_color = vec3<f32>(0.3, 0.3, 0.35);
        let result = mix(body_color, flow_color, mask);

        let texUV = (world - params.domMin) / (params.domMax - params.domMin);
        let oob = texUV.x < 0.0 || texUV.x > 1.0 || texUV.y < 0.0 || texUV.y > 1.0;
        return vec4<f32>(select(result, vec3(0.95), oob), 1.0);
      }
    `;

    const bgl = device.createBindGroupLayout({ entries: [
      {binding:0, visibility:GPUShaderStage.FRAGMENT|GPUShaderStage.VERTEX, buffer:{type:'uniform'}},
      {binding:1, visibility:GPUShaderStage.FRAGMENT, texture:{sampleType:'unfilterable-float'}},
      {binding:2, visibility:GPUShaderStage.FRAGMENT, texture:{sampleType:'unfilterable-float'}},
      {binding:3, visibility:GPUShaderStage.FRAGMENT, texture:{}},
      {binding:4, visibility:GPUShaderStage.FRAGMENT, sampler:{}},
    ]});
    const paramsBuf = device.createBuffer({size:96, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
    const shaderModule = device.createShaderModule({label:'square-flow', code:shaderCode});
    const pipeline = device.createRenderPipeline({
      layout: device.createPipelineLayout({bindGroupLayouts:[bgl]}),
      vertex:{module:shaderModule, entryPoint:'vs'},
      fragment:{module:shaderModule, entryPoint:'fs', targets:[{format:canvasFormat}]},
      primitive:{topology:'triangle-strip'},
    });
    const bindGroup = device.createBindGroup({ layout:bgl, entries:[
      {binding:0,resource:{buffer:paramsBuf}},
      {binding:1,resource:psiTexture.createView()},
      {binding:2,resource:maskTexture.createView()},
      {binding:3,resource:colorscaleTexture.createView()},
      {binding:4,resource:colorscaleSampler},
    ]});
  </script>

  <script id="createPlot" type="module">
    function createFlowPlot(w, h, xDomain=[-3,3], yDomain=[-3,3]) {
      return Plot.plot({
        width:w, height:h,
        marginTop:10, marginRight:10, marginLeft:40, marginBottom:30,
        style:{backgroundColor:"transparent", maxWidth:"none", position:"absolute"},
        x:{domain:xDomain, tickSpacing:80, label:"x"},
        y:{domain:yDomain, tickSpacing:80, label:"y"},
        marks:[
          Plot.line(data.boundary, {x:d=>d[0], y:d=>d[1], stroke:"#000", strokeWidth:2}),
        ],
      });
    }
  </script>

  <script id="stack" type="module">
    const pixelRatio = devicePixelRatio;
    const plotW = Math.min(width, 600);
    const plotH = plotW;
    const stack = createElementStack({
      layers:[{
        id:'webgpu',
        element:({current,width,height})=>{
          let canvas,ctx;
          if(current){canvas=current;ctx=canvas._gpuContext;}
          else{canvas=document.createElement('canvas');ctx=canvas.getContext('webgpu');canvas._gpuContext=ctx;}
          canvas.width=Math.floor(width*pixelRatio);canvas.height=Math.floor(height*pixelRatio);
          canvas.style.cssText=`width:${width}px;height:${height}px;position:absolute;top:0;left:0`;
          ctx.configure({device,format:canvasFormat});return canvas;
        }
      },{
        id:'plot', element:({width,height})=>createFlowPlot(width,height)
      },{
        id:'svg',
        element:({current,width,height})=>
          (current?d3.select(current):d3.create("svg"))
            .attr("width",width).attr("height",height)
            .style("position","absolute").style("top","0").style("left","0").node()
      }],
      width:plotW, height:plotH,
    });
  </script>

  <script id="axes" type="module">
    const renderDirty = {value:true};
    const axes = createZoomableAxes({
      d3, element:stack.elements.svg,
      xScale:stack.elements.plot.scale("x"), yScale:stack.elements.plot.scale("y"),
      aspectRatio:1,
      onChange:({xDomain,yDomain})=>{
        renderDirty.value=true;
        const p=createFlowPlot(stack.width,stack.height,xDomain,yDomain);
        stack.elements.plot.replaceWith(p);stack.elements.plot=p;
        stack.dispatchEvent(new CustomEvent('update'));
      }
    });
  </script>

  <script id="figure" type="module">
    stack.resize(plotW,plotH);
    axes.updateScales(stack.elements.plot.scale("x"),stack.elements.plot.scale("y"));
    renderDirty.value=true;
    display(html`<figure style="position:relative">${stack.element}<figcaption>Scroll to zoom, drag to pan. Color shows stream function ψ; black lines are streamlines.</figcaption></figure>`);
  </script>

  <script id="poleOverlay" type="module">
    const svg = d3.select(stack.elements.svg);
    const defs = svg.selectAll('defs').data([0]).join('defs');
    defs.selectAll('clipPath#clip').data([0]).join('clipPath').attr('id','clip').selectAll('rect').data([0]).join('rect');
    const clipped = svg.selectAll('g.clipped').data([0]).join('g').attr('class','clipped').attr('clip-path','url(#clip)');
    const poleMarkers = data.poles.map(([re,im])=>({re,im}));
    const dots = clipped.selectAll('circle.marker').data(poleMarkers).join('circle')
      .attr('class','marker').attr('r',2.5)
      .attr('fill','rgba(220,50,50,0.7)').attr('stroke','#800').attr('stroke-width',0.5);
    function updatePositions(){
      const[x0,x1]=axes.xRange;const[y0,y1]=axes.yRange;
      defs.select('#clip rect').attr('x',Math.min(x0,x1)).attr('y',Math.min(y0,y1))
        .attr('width',Math.abs(x1-x0)).attr('height',Math.abs(y1-y0));
      dots.attr('cx',d=>axes.xScale(d.re)).attr('cy',d=>axes.yScale(d.im));
    }
    updatePositions();
    stack.addEventListener('update',updatePositions);
  </script>

  <script id="renderLoop" type="module">
    const gpuCtx = stack.elements.webgpu._gpuContext;
    const gpuCanvas = stack.elements.webgpu;
    function render(){
      if(!renderDirty.value) return;
      renderDirty.value=false;
      const p=new Float32Array(24);
      p.set(axes.viewInverse,0);
      p[16]=data.psiMin; p[17]=data.psiMax;
      p[18]=data.domMin[0]; p[19]=data.domMin[1];
      p[20]=data.domMax[0]; p[21]=data.domMax[1];
      device.queue.writeBuffer(paramsBuf,0,p);
      const vp=webgpuAxesViewport(axes,pixelRatio,gpuCanvas.height);
      const enc=device.createCommandEncoder();
      const pass=enc.beginRenderPass({colorAttachments:[{
        view:gpuCtx.getCurrentTexture().createView(),
        clearValue:{r:0.95,g:0.95,b:0.95,a:1},loadOp:'clear',storeOp:'store',
      }]});
      pass.setViewport(vp.x,vp.y,vp.width,vp.height,0,1);
      pass.setScissorRect(Math.round(vp.x),Math.round(vp.y),Math.round(vp.width),Math.round(vp.height));
      pass.setPipeline(pipeline);pass.setBindGroup(0,bindGroup);pass.draw(4);pass.end();
      device.queue.submit([enc.finish()]);
    }
    if(!stack._animLoop){
      function loop(){render();stack._animLoop=requestAnimationFrame(loop);}
      loop();
      invalidation.then(()=>{cancelAnimationFrame(stack._animLoop);stack._animLoop=null;});
    }
  </script>

  <script id="nacaHeader" type="text/markdown">
    ## NACA Airfoil

    Uniform flow past a NACA 4-digit airfoil. The boundary correction ${ tex`f(z)` } is solved via the same polynomial + AAA approach, with ${ tex`w(z) = z + f(z)` } and ${ tex`\operatorname{Im}[f] = -y` } on the airfoil surface. The solution is evaluated **per-pixel in the fragment shader** — no grid texture.
  </script>

  <script id="nacaControls" type="module">
    const nacaDigits = view(Inputs.select(
      ['0012', '2412', '4412', '0024', '6412'],
      { label: 'NACA airfoil', value: '2412' }
    ));
    const nacaMmax = view(Inputs.range([50, 300], { label: 'AAA iterations', value: 200, step: 50 }));
  </script>

  <script id="nacaCompute" type="module">
    const nacaResponse = await workerCall({
      type: 'naca',
      options: { digits: nacaDigits, nPoints: 400, mmax: nacaMmax, gridN: 512 },
    });
    const ng = nacaResponse.result;
  </script>

  <script id="nacaInfo" type="module">
    display(md`
**NACA ${ng.digits}** — ${ng.poles.length} AAA poles. Boundary error: \`${ng.maxError.toExponential(2)}\`. Solved in ${(nacaResponse.solveTime/1000).toFixed(2)}s, grid in ${(nacaResponse.gridTime/1000).toFixed(2)}s.
    `);
  </script>

  <script id="nacaVis" type="module">
    const ngridN = ng.gridN;
    function createF32Tex(label, buf) {
      const tex = device.createTexture({label,size:[ngridN,ngridN],format:'r32float',usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST});
      device.queue.writeTexture({texture:tex},buf,{bytesPerRow:ngridN*4},[ngridN,ngridN]);
      return tex;
    }
    const nPsiTex = createF32Tex('naca-psi', ng.psiGrid);
    const nSpeedTex = createF32Tex('naca-speed', ng.speedGrid);
    const nMaskTex = createF32Tex('naca-mask', ng.maskGrid);

    const nShader = `
      struct VertexOutput { @builtin(position) position: vec4<f32>, @location(0) uv: vec2<f32> };
      struct Params {
        viewInverse: mat4x4<f32>,
        psiMin: f32, psiMax: f32,
        domMin: vec2<f32>, domMax: vec2<f32>,
        _pad: vec2<f32>,
      };
      @group(0) @binding(0) var<uniform> params: Params;
      @group(0) @binding(1) var psi_tex: texture_2d<f32>;
      @group(0) @binding(2) var speed_tex: texture_2d<f32>;
      @group(0) @binding(3) var mask_tex: texture_2d<f32>;

      fn bilinear(tex: texture_2d<f32>, uv: vec2<f32>) -> f32 {
        let sz = vec2<f32>(textureDimensions(tex));
        let tc = uv * sz - 0.5;
        let tc0 = vec2<i32>(floor(tc));
        let fr = fract(tc);
        let mx = vec2<i32>(sz) - 1;
        let a = textureLoad(tex, clamp(tc0, vec2<i32>(0), mx), 0).r;
        let b = textureLoad(tex, clamp(tc0+vec2<i32>(1,0), vec2<i32>(0), mx), 0).r;
        let c = textureLoad(tex, clamp(tc0+vec2<i32>(0,1), vec2<i32>(0), mx), 0).r;
        let d = textureLoad(tex, clamp(tc0+vec2<i32>(1,1), vec2<i32>(0), mx), 0).r;
        return mix(mix(a,b,fr.x), mix(c,d,fr.x), fr.y);
      }

      @vertex fn vs(@builtin(vertex_index) i: u32) -> VertexOutput {
        var pos = array<vec2<f32>,4>(vec2(-1.,-1.),vec2(1.,-1.),vec2(-1.,1.),vec2(1.,1.));
        var out: VertexOutput; out.position = vec4<f32>(pos[i],0,1); out.uv = pos[i]; return out;
      }

      @fragment fn fs(input: VertexOutput) -> @location(0) vec4<f32> {
        let world = (params.viewInverse * vec4<f32>(input.uv, 0.0, 1.0)).xy;
        let uv = clamp((world - params.domMin) / (params.domMax - params.domMin), vec2(0.0), vec2(1.0));
        let psi = bilinear(psi_tex, uv);
        let speed = bilinear(speed_tex, uv);
        let mask = bilinear(mask_tex, uv);

        // Coolwarm: blue (slow) → white (speed≈1) → red (fast)
        let st = clamp(speed * 0.5, 0.0, 1.0);
        var color: vec3<f32>;
        if (st < 0.5) {
          let s = st * 2.0;
          color = vec3<f32>(0.23 + 0.77*s, 0.3 + 0.7*s, 0.75 + 0.25*s);
        } else {
          let s = (st - 0.5) * 2.0;
          color = vec3<f32>(0.9 + 0.1*s, 1.0 - 0.65*s, 1.0 - 0.7*s);
        }

        // Streamline contours
        let nContours = 40.0;
        let interval = (params.psiMax - params.psiMin) / nContours;
        let grad = length(vec2<f32>(dpdx(psi), dpdy(psi)));
        let dist = abs(fract(psi / interval - 0.5) - 0.5) * interval / max(grad, 1e-8);
        let contour_alpha = 1.0 - smoothstep(0.5, 1.5, dist);

        let flow_color = mix(color, vec3(0.1), contour_alpha * 0.55);
        let body_color = vec3<f32>(0.22, 0.24, 0.28);
        let result = mix(body_color, flow_color, mask);
        let texUV = (world - params.domMin) / (params.domMax - params.domMin);
        let oob = texUV.x < 0.0 || texUV.x > 1.0 || texUV.y < 0.0 || texUV.y > 1.0;
        return vec4<f32>(select(result, vec3(0.95), oob), 1.0);
      }
    `;

    const nBGL = device.createBindGroupLayout({ entries: [
      {binding:0, visibility:GPUShaderStage.FRAGMENT|GPUShaderStage.VERTEX, buffer:{type:'uniform'}},
      {binding:1, visibility:GPUShaderStage.FRAGMENT, texture:{sampleType:'unfilterable-float'}},
      {binding:2, visibility:GPUShaderStage.FRAGMENT, texture:{sampleType:'unfilterable-float'}},
      {binding:3, visibility:GPUShaderStage.FRAGMENT, texture:{sampleType:'unfilterable-float'}},
    ]});
    const nParamsBuf = device.createBuffer({size:96, usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
    const nModule = device.createShaderModule({label:'naca-tex', code:nShader});
    const nPipeline = device.createRenderPipeline({
      layout: device.createPipelineLayout({bindGroupLayouts:[nBGL]}),
      vertex:{module:nModule, entryPoint:'vs'},
      fragment:{module:nModule, entryPoint:'fs', targets:[{format:canvasFormat}]},
      primitive:{topology:'triangle-strip'},
    });
    const nBindGroup = device.createBindGroup({ layout:nBGL, entries:[
      {binding:0,resource:{buffer:nParamsBuf}},
      {binding:1,resource:nPsiTex.createView()},
      {binding:2,resource:nSpeedTex.createView()},
      {binding:3,resource:nMaskTex.createView()},
    ]});
  </script>

  <script id="nacaPlotFn" type="module">
    function createNacaPlot(w, h, xDomain=[-0.3,1.3], yDomain=[-0.5,0.5]) {
      return Plot.plot({
        width:w, height:h,
        marginTop:10, marginRight:10, marginLeft:40, marginBottom:30,
        style:{backgroundColor:"transparent", maxWidth:"none", position:"absolute"},
        x:{domain:xDomain, tickSpacing:80, label:"x"},
        y:{domain:yDomain, tickSpacing:80, label:"y"},
        marks:[
          Plot.line(ng.boundary.concat([ng.boundary[0]]), {x:d=>d[0], y:d=>d[1], stroke:"#000", strokeWidth:1.5}),
        ],
      });
    }
  </script>

  <script id="nacaStack" type="module">
    const nPixelRatio = devicePixelRatio;
    const nPlotW = Math.min(width, 720);
    const nDomainAspect = 1.6 / 1.0;
    const nPlotH = Math.round(nPlotW / nDomainAspect);
    const nStack = createElementStack({
      layers:[{
        id:'webgpu',
        element:({current,width,height})=>{
          let canvas,ctx;
          if(current){canvas=current;ctx=canvas._gpuContext;}
          else{canvas=document.createElement('canvas');ctx=canvas.getContext('webgpu');canvas._gpuContext=ctx;}
          canvas.width=Math.floor(width*nPixelRatio);canvas.height=Math.floor(height*nPixelRatio);
          canvas.style.cssText=`width:${width}px;height:${height}px;position:absolute;top:0;left:0`;
          ctx.configure({device,format:canvasFormat});return canvas;
        }
      },{
        id:'plot', element:({width,height})=>createNacaPlot(width,height)
      },{
        id:'svg',
        element:({current,width,height})=>
          (current?d3.select(current):d3.create("svg"))
            .attr("width",width).attr("height",height)
            .style("position","absolute").style("top","0").style("left","0").node()
      }],
      width:nPlotW, height:nPlotH,
    });
  </script>

  <script id="nacaAxes" type="module">
    const nRenderDirty = {value:true};
    const nAxes = createZoomableAxes({
      d3, element:nStack.elements.svg,
      xScale:nStack.elements.plot.scale("x"), yScale:nStack.elements.plot.scale("y"),
      aspectRatio:1,
      onChange:({xDomain,yDomain})=>{
        nRenderDirty.value=true;
        const p=createNacaPlot(nStack.width,nStack.height,xDomain,yDomain);
        nStack.elements.plot.replaceWith(p);nStack.elements.plot=p;
        nStack.dispatchEvent(new CustomEvent('update'));
      }
    });
  </script>

  <script id="nacaFigure" type="module">
    nStack.resize(nPlotW,nPlotH);
    nAxes.updateScales(nStack.elements.plot.scale("x"),nStack.elements.plot.scale("y"));
    nRenderDirty.value=true;
    display(html`<figure style="position:relative">${nStack.element}<figcaption>Scroll to zoom, drag to pan. Texture-based rendering (f64 on CPU).</figcaption></figure>`);
  </script>

  <script id="nacaRenderLoop" type="module">
    const nGpuCtx = nStack.elements.webgpu._gpuContext;
    const nGpuCanvas = nStack.elements.webgpu;
    function nRender(){
      if(!nRenderDirty.value) return;
      nRenderDirty.value=false;
      const p=new Float32Array(24);
      p.set(nAxes.viewInverse,0);
      p[16]=ng.psiMin; p[17]=ng.psiMax;
      p[18]=ng.domMin[0]; p[19]=ng.domMin[1];
      p[20]=ng.domMax[0]; p[21]=ng.domMax[1];
      device.queue.writeBuffer(nParamsBuf,0,p);
      const vp=webgpuAxesViewport(nAxes,nPixelRatio,nGpuCanvas.height);
      const enc=device.createCommandEncoder();
      const pass=enc.beginRenderPass({colorAttachments:[{
        view:nGpuCtx.getCurrentTexture().createView(),
        clearValue:{r:0.95,g:0.95,b:0.95,a:1},loadOp:'clear',storeOp:'store',
      }]});
      pass.setViewport(vp.x,vp.y,vp.width,vp.height,0,1);
      pass.setScissorRect(Math.round(vp.x),Math.round(vp.y),Math.round(vp.width),Math.round(vp.height));
      pass.setPipeline(nPipeline);pass.setBindGroup(0,nBindGroup);pass.draw(4);pass.end();
      device.queue.submit([enc.finish()]);
    }
    if(!nStack._nacaLoop){
      function nLoop(){nRender();nStack._nacaLoop=requestAnimationFrame(nLoop);}
      nLoop();
      invalidation.then(()=>{cancelAnimationFrame(nStack._nacaLoop);nStack._nacaLoop=null;});
    }
  </script>
